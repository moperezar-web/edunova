<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduNova - Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/globales.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="contenedor-login">
    <div class="tarjeta-login">
      <div class="encabezado-login">
        <span class="logo-icono">🎓</span>
        <h2>EduNova</h2>
        <p>Introduce tus credenciales para acceder a la red local</p>
      </div>

      <form id="formulario-login">
        <div class="grupo-input">
          <label for="usuario">Usuario o Correo</label>
          <input type="text" id="usuario" placeholder="Ej. alumno2026" required>
        </div>

        <div class="grupo-input">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div id="mensaje-error" class="error-oculto"></div>

        <button type="submit" class="boton-ingresar">Ingresar al Sistema</button>
      </form>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
